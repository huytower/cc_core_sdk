name: features
description: A collection of reusable feature modules for the application.
version: 1.0.0
publish_to: none

environment:
  sdk: '^3.11.5'

dependencies:
  cc_sdk:
    path: ../cc_sdk
  cc_sdk_ui:
    path: ../cc_sdk_ui
  dio: ^5.9.2
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  injectable: ^3.0.0
  local_auth: ^3.0.1
  shared_preferences: ^2.5.5

dev_dependencies:
  build_runner: ^2.15.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  injectable_generator: ^3.0.2

# For generating JSON serialization code
flutter:
  uses-material-design: true
  generate: true
