name: features
description: A collection of reusable feature modules for the application.
version: 1.0.0
publish_to: none

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  cc_sdk:
    path: ../cc_sdk
  cc_sdk_ui:
    path: ../cc_sdk_ui
  dio:
  equatable:
  flutter:
    sdk: flutter
  flutter_bloc:
  get_it:
  injectable:
  local_auth:
  shared_preferences:

dev_dependencies:
  build_runner:
  flutter_lints:
  flutter_test:
    sdk: flutter
  injectable_generator:

# For generating JSON serialization code
flutter:
  uses-material-design: true
  generate: true
