  flutter: '>=3.41.9'

dependencies:
  app_config:
    path: modules/app_config
  auto_route: ^11.1.0

  bloc: ^9.2.1
  cc_sdk:
    path: libraries/cc_sdk
  cc_sdk_ui:
    path: libraries/cc_sdk_ui
  content_locale:
    path: modules/message
  custom_refresh_indicator: ^4.0.1

  data:
