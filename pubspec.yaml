  shared_preferences: ^2.5.5

  features:
    path: libraries/features

  theme:
    path: modules/theme

  url_launcher: ^6.3.2
  uuid: ^4.5.3

  watch_it: ^2.4.2
  webview_flutter: ^4.13.1
  widget:
    path: modules/widget

dev_dependencies:
  auto_route_generator: ^10.5.0
  bloc_test: ^10.0.0
  build_runner: ^2.15.0
  flutter_test:
    sdk: flutter
  fvm: ^2.4.1
  injectable_generator: ^3.0.2
  lint: ^2.8.0

flutter:
