  easy_localization: ^3.0.8
  equatable: ^2.0.8
  flutter:
    sdk: flutter

  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.1
  flutter_lints: ^6.0.0
  flutter_spinkit: ^5.2.2
  flutter_svg: ^2.3.0
  #  fluttertoast:

  get: ^4.7.3
  get_it: ^9.2.1

  google_fonts: ^8.1.0
  hive_ce: ^2.19.3
