name: mobile_flutter_template
description: Mobile Flutter Template's Overview
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  app_config:
    path: modules/app_config

  auto_route: 10.1.0+1
  cc_library:
    path: libraries/cc_library

  content_locale:
    path: modules/message

  custom_refresh_indicator:

  data:
    path: modules/data
  device_info_plus:
  dio:

  easy_localization:
  flutter:
    sdk: flutter

  flutter_bloc:
  flutter_lints:
  flutter_spinkit:
  flutter_svg:
  #  fluttertoast:

  get:
  get_it:

  google_fonts:
  injectable:
  intl:

  # Dart data class
  json_annotation:
  json_serializable:

  loadmore:
  logger:
  lottie:
  dio_smart_retry:
  path_provider:
  provider:
  reusable:
    path: modules/reusable

  shared_preferences:

  features:
    path: libraries/features

  theme:
    path: modules/theme

  url_launcher:
  uuid:

  watch_it:
  webview_flutter:
  widget:
    path: modules/widget

dev_dependencies:
  auto_route_generator:
  bloc_test: ^9.1.4
  build_runner:
  effective_dart:
  flutter_test:
    sdk: flutter
  fvm:
  injectable_generator:
  lint:

dependency_overrides:
  win32:

flutter:
  uses-material-design: true
  
  # Environment files
  assets:
    - env/.env
    - env/.env.uat
    - env/.env.production