name: mobile_flutter_template
description: Mobile Flutter Template's Overview
publish_to: none
version: 1.0.0+1

environment:
  sdk: '^3.11.5'
  flutter: '>=3.41.9'

workspace:
  - modules/app_config
  - modules/data
  - modules/message
  - modules/theme
  - cc_core_sdk/cc_sdk
  - cc_core_sdk/cc_sdk_ui
  - cc_core_sdk/cc_mixin
  - features

dependencies:
  app_config:
    path: modules/app_config
  auto_route: ^11.1.0

  bloc: ^9.2.1
  catcher_2: ^2.1.9
  cc_mixin:
    path: cc_core_sdk/cc_mixin
  cc_sdk:
    path: cc_core_sdk/cc_sdk
  cc_sdk_ui:
    path: cc_core_sdk/cc_sdk_ui
  custom_refresh_indicator: ^4.0.1

  data:
    path: modules/data
  device_info_plus: ^13.1.0
  dio: ^5.9.2
  dio_smart_retry: ^7.0.1

  easy_localization: ^3.0.8
  equatable: ^2.0.8

  firebase_core: ^3.11.0
  firebase_auth: ^5.5.0

  features:
    path: features
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.1
  flutter_lints: ^6.0.0
  flutter_spinkit: ^5.2.2
  flutter_svg: ^2.3.0

  get: ^4.7.3
  get_it: ^9.2.1

  google_fonts: ^8.1.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  injectable: ^3.0.0
  internet_connection_checker_plus: ^3.0.0
  intl: ^0.20.2

  # Dart data class
  json_annotation: ^4.12.0
  json_serializable: ^6.14.0

  loadmore: ^2.1.0
  logger: ^2.7.0
  lottie: ^3.3.3

  melos: ^7.8.0
  message:
    path: modules/message
  path: ^1.9.1
  path_provider: ^2.1.5
  provider: ^6.1.5+1

  shared_preferences: ^2.5.5

  theme:
    path: modules/theme

  url_launcher: ^6.3.2
  uuid: ^4.5.3

  webview_flutter: ^4.13.1

dev_dependencies:
  auto_route_generator: ^10.5.0
  bloc_test: ^10.0.0
  build_runner: ^2.15.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1
  flutter_test:
    sdk: flutter
  injectable_generator: ^3.0.2
  lean_builder: ^0.1.10
  lint: ^2.8.0

melos:
  scripts:
    # Full bootstrap: use flutter pub get for Melos 7 Workspaces
    bootstrap:
      description: Bootstrap the workspace and download all dependencies.
      run: flutter pub get

    # Full rebuild: pub get followed by stable code generation
    rebuild:
      description: Run bootstrap followed by code generation (stable).
      run: flutter pub get && melos exec --depends-on="build_runner" -- "flutter pub run build_runner build --delete-conflicting-outputs"

flutter:
  uses-material-design: true

  # Environment files
  assets:
    - env/.env.development
    - env/.env.uat
    - env/.env.production
    - assets/icon/
    - assets/lottie/

flutter_launcher_icons:
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#ffffff"

flutter_native_splash:
  color: "#36454F"
  image: assets/icon/app_icon.png
  android_gravity: center
  ios_content_mode: center
  android_12:
    image: assets/icon/app_icon.png
    color: "#36454F"
