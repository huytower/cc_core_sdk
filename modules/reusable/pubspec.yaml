name: reusable
description: A new Flutter package project.
version: 0.0.1
publish_to: none

environment:
  sdk: '^3.11.5'
  flutter: '>=3.41.9'

dependencies:

  animated_toggle_switch: ^0.8.7

  app_config:
    path: ../app_config

  cc_sdk:
    path: ../../libraries/cc_sdk
  cc_sdk_ui:
    path: ../../libraries/cc_sdk_ui

  data:
    path: ../data

  flutter:
    sdk: flutter
  flutter_spinkit: ^5.2.2
  get: ^4.7.3
  google_fonts: ^8.1.0
  provider: ^6.1.5+1

  theme:
    path: ../theme

  widget:
    path: ../widget

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
