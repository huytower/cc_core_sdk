name: features
description: A collection of reusable feature modules for the application.
version: 1.0.0
publish_to: none

environment:
  sdk: '^3.11.5'

resolution: workspace

dependencies:
  cc_sdk:
    path: ../cc_core_sdk/cc_sdk
  cc_sdk_ui:
    path: ../cc_core_sdk/cc_sdk_ui
  data:
    path: ../modules/data
  auto_route: ^11.1.0
  dio: ^5.9.2
  easy_localization: ^3.0.8
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.1
  bloc: ^9.2.1
  catcher_2: ^2.1.9
  get_it: ^9.2.1
  injectable: ^3.0.0
  local_auth: ^3.0.1
  local_auth_android: ^2.0.0
  local_auth_darwin: ^2.0.0
  multiple_result: ^5.3.0
  shared_preferences: ^2.5.2
  webview_flutter: ^4.13.1

dev_dependencies:
  auto_route_generator: ^10.5.0
  build_runner: ^2.15.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  injectable_generator: ^3.0.2
  lean_builder: ^0.1.10

# For generating JSON serialization code
flutter:
  uses-material-design: true
  generate: true
